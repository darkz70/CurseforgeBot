name: Add money

on:
  workflow_dispatch:
    inputs:
      amount:
        description: "Сумма дохода (например 12.50)"
        required: true
      note:
        description: "Комментарий (необязательно, например название проекта)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  add-money:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Add money entry
        env:
          MONEY_AMOUNT: ${{ github.event.inputs.amount }}
          MONEY_NOTE: ${{ github.event.inputs.note }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/add_money.py

      - name: Commit updated money data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/money.json
          git diff --staged --quiet || git commit -m "chore: add money entry [skip ci]"
          git push
