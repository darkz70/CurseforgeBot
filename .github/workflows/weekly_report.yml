name: Weekly PDF report

on:
  schedule:
    # Каждое воскресенье в 20:00 UTC
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests matplotlib
      - name: Send weekly PDF report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/weekly_report.py
